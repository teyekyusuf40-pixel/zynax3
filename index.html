<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ZYnaX v45: THE CORE BREAKER</title>
    <style>
        /* Ana Tema */
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        .main-container {
            width: 900px;
            border: 1px dashed #444;
            background-color: #111;
            padding: 50px;
            text-align: center;
            border-left: 3px solid #f00;
            border-right: 3px solid #f00;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            margin-top: 50px;
        }

        .download-btn {
            background-color: #f00;
            color: #fff;
            padding: 25px 50px;
            border: none;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 20px #f00;
            transition: 0.3s;
        }

        .download-btn:hover { transform: scale(1.1); }

        /* --- GOOGLE PLAY MODAL (ANIMASYONLU) --- */
        #googlePayModal {
            display: none; 
            background-color: #fff;
            width: 100%;
            max-width: 420px;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 25px;
            box-shadow: 0 -15px 60px rgba(0,0,0,0.9);
            z-index: 1000;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #333;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100%); }
            to { transform: translate(-50%, 0); }
        }

        .gp-header { display: flex; align-items: center; margin-bottom: 25px; }
        .gp-logo { width: 35px; margin-right: 15px; }
        
        .item-info { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        .buy-btn {
            background-color: #01875f;
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 35px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }
    </style>
</head>
<body>

    <h1 style="color: #f00;">ZYnaX v45: THE CORE BREAKER</h1>

    <div class="main-container">
        <h2 style="color: #0f0;">SİSTEM OPTİMİZE EDİLDİ</h2>
        <p>MSI Katana Serisi İçin Özel v45.0.2 Sürümü</p>
        <br><br>
        <button onclick="odemeBaslat()" class="download-btn">İNDİRMEK İÇİN TIKLA (.py)</button>
    </div>

    <div id="overlay" onclick="kapat()"></div>
    <div id="googlePayModal">
        <div class="gp-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" class="gp-logo">
            <div style="font-size: 20px; font-weight: 600; color: #202124;">Google Play</div>
        </div>
        
        <div class="item-info">
            <div style="color: #5f6368; font-size: 16px;">ZYnaX v45 Pro</div>
            <div style="font-weight: bold; font-size: 18px;">1,00 TL</div>
        </div>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 25px;">
            <div style="font-size: 12px; color: #5f6368; margin-bottom: 5px;">ÖDEME YÖNTEMİ</div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; color: #3c4043;">Google Play Bakiyesi</span>
                <span style="color: #01875f; font-weight: bold; font-size: 14px;">Seçili</span>
            </div>
            <div style="font-size: 13px; color: #80868b; margin-top: 3px;">Bakiye: 25,00 TL</div>
        </div>

        <button class="buy-btn" onclick="basarili()">TEK TIKLA SATIN AL</button>
        
        <p style="font-size: 11px; color: #9aa0a6; text-align: center; margin-top: 15px; line-height: 1.4;">
            "Satın Al"a bastığınızda işlem onaylanır. Ödeme Yusuf Dadaş'ın siber havuzuna (öylesine) gönderilir.
        </p>
    </div>

    <script>
        function odemeBaslat() {
            // Artık alert yok! Direkt paneli açıyoruz.
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('googlePayModal').style.display = 'block';
        }

        function kapat() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('googlePayModal').style.display = 'none';
        }

        function basarili() {
            // Sadece sonunda bir onay verir
            alert("İşlem Başarılı! 1 TL Google bakiyenizden düştü. Dosya indiriliyor...");
            kapat();
        }
    </script>
</body>
</html>
