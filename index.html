<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Google Play Ödeme</title>
    <style>
        body {
            background-color: #000;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Google Play Penceresi */
        .google-pay-modal {
            background-color: #fff;
            width: 100%;
            max-width: 400px;
            position: fixed;
            bottom: 0;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease-out;
            color: #333;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .gp-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .gp-logo {
            width: 40px;
            margin-right: 15px;
        }

        .gp-title {
            font-size: 18px;
            font-weight: 500;
            color: #202124;
        }

        .item-info {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .item-name { font-weight: bold; color: #5f6368; }
        .item-price { font-weight: bold; color: #202124; }

        .balance-info {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .balance-text { font-size: 14px; color: #3c4043; flex: 1; }

        .buy-btn {
            background-color: #01875f; /* Google Play Yeşili */
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover { background-color: #016d4d; }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #80868b;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="google-pay-modal">
    <div class="gp-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" class="gp-logo" alt="GP">
        <div class="gp-title">Google Play</div>
    </div>

    <div class="item-info">
        <div class="item-name">ZYnaX v45 Pro License</div>
        <div class="item-price">1,00 TL</div>
    </div>

    <div class="balance-info">
        <div class="balance-text">
            <strong>Google Play Bakiyesi:</strong><br>
            Mevcut bakiye: 15,50 TL
        </div>
        <span style="color: #01875f; font-weight: bold;">Seçili</span>
    </div>

    <button class="buy-btn" onclick="odemeTamam()">TEK TIKLA SATIN AL</button>

    <div class="footer-text">
        "Satın Al" butonuna basarak Google Play Hizmet Şartları'nı kabul etmiş olursunuz. 1 TL bakiyenizden düşülecek ve boşa gidecektir.
    </div>
</div>

<script>
    function odemeTamam() {
        alert('Ödeme Başarılı! 1 TL Google Bakiyenizden düşüldü (Şaka şaka, hiçbir yere gitmedi). ZYnaX v45 İndiriliyor...');
        window.location.href = "zynax_v45.py"; // Buraya dosya linkini koyarsın
    }
</script>

</body>
</html>
