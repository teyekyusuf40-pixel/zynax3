<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ZYnaX v45: THE CORE BREAKER</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 50px; overflow: hidden; }
        .box { border: 2px solid #f00; padding: 50px; background: #111; display: inline-block; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        .btn { background: #f00; color: #fff; padding: 25px 50px; border: none; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 10px; box-shadow: 0 0 20px #f00; }
        
        /* Google Play Modal */
        #gpModal { display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: #fff; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 25px; box-shadow: 0 -10px 50px #000; z-index: 100; color: #333; font-family: 'Segoe UI', sans-serif; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 90; }
        .buy-btn { background: #01875f; color: #fff; width: 100%; padding: 18px; border: none; border-radius: 35px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <h1 style="color: #f00;">ZYnaX v45 OFFICIAL</h1>
        <p>MSI Katana & High Performance Systems</p>
        <br><br>
        <button onclick="ac()" class="btn">İNDİR (.py)</button>
    </div>

    <div class="overlay" id="bg" onclick="kapat()"></div>
    <div id="gpModal">
        <div style="display: flex; align-items: center; margin-bottom: 20px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" width="35" style="margin-right: 15px;">
            <b style="font-size: 20px;">Google Play</b>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span style="color: #5f6368;">ZYnaX v45 Pro License</span>
            <b style="font-size: 18px;">1,00 TL</b>
        </div>
        <div style="background: #f1f3f4; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            <div style="font-size: 12px; color: #5f6368;">ÖDEME YÖNTEMİ</div>
            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                <b>Google Play Bakiyesi</b>
                <span style="color: #01875f; font-weight: bold;">Seçili</span>
            </div>
            <div style="font-size: 13px; color: #80868b;">Bakiye: 25,00 TL</div>
        </div>
        <button class="buy-btn" onclick="indir()">TEK TIKLA SATIN AL</button>
    </div>

    <script>
        function ac() {
            document.getElementById('bg').style.display = 'block';
            document.getElementById('gpModal').style.display = 'block';
        }

        function kapat() {
            document.getElementById('bg').style.display = 'none';
            document.getElementById('gpModal').style.display = 'none';
        }

        function indir() {
            alert("Ödeme Onaylandı! 1 TL Bakiyenizden düşüldü. Dosya indiriliyor...");
            
            // GITHUB İÇİN DOĞRUDAN İNDİRME LİNKİ
            // index.html ile zynax_v45.py aynı klasördeyse bu kod çalışır.
            const fileUrl = 'zynax_v45.py'; 
            const link = document.createElement('a');
            link.href = fileUrl;
            link.setAttribute('download', 'zynax_v45.py');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            kapat();
        }
    </script>
</body>
</html>
