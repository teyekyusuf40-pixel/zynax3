<!DOCTYPE html>
<html lang="tr">
<head>

        body {

            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .status { color: #ff0; font-weight: bold; margin-top: 10px; font-size: 14px; }

        .main-container {
            display: flex;
            width: 95%;
            max-width: 900px;
            border: 1px dashed #444;
            background-color: #111;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .sidebar {
            width: 120px;
            padding: 15px;
            font-size: 11px;
            color: #888;
            text-align: center;
        }

        .content {
            flex: 1;
            padding: 40px 20px;
            text-align: center;
            border-left: 2px solid #f00;
            border-right: 2px solid #f00;
            background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
        }

        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        h2 { color: #0f0; margin-top: 10px; font-size: 20px; }

        .download-btn {
            background-color: #f00;
            color: #fff;
            padding: 18px 35px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 15px #f00;
            margin-top: 20px;
        }

        /* Google Play Modal */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
        }

        #gpModal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 400px;
            background-color: #fff;
            border-radius: 24px 24px 0 0;
            padding: 25px;
            box-shadow: 0 -10px 50px #000;
            z-index: 1000;
            font-family: Arial, sans-serif;
            color: #333;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }

        .gp-logo { width: 30px; margin-right: 15px; }
        .buy-btn { background-color: #01875f; color: #fff; width: 100%; padding: 15px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">

        <div class="status">Status: SECURE CONNECTION ESTABLISHED</div>
    </div>

    <div class="main-container">
        <div class="sidebar">REKLAM ALANI</div>

        <div class="content">
            <h2>LATEST VERSION: v45.0.2</h2>
            <p>MSI Katana ve yüksek performanslı sistemler için optimize edilmiştir.</p>
            <br>

        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>ZYnaX v45 Pro License</span>

        </div>
        <div style="background: #f1f3f4; padding: 15px; border-radius: 12px; font-size: 14px;">
            Google Play Bakiyesi: <b>25,00 TL</b>
        </div>
        <button class="buy-btn" onclick="indirmeyiBaslat()">TEK TIKLA SATIN AL</button>
    </div>

    <script>
        function odemeAc() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('gpModal').style.display = 'block';
        }

        function odemeKapat() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('gpModal').style.display = 'none';
        }

        function indirmeyiBaslat() {
            alert("Ödeme Onaylandı! Yusuf Dadaş'ın dosyası indiriliyor...");
            
            // GITHUB'DAKİ GERÇEK DOSYA ADIN:
            const dosya = 'ZYnaXPC.py'; 

            const link = document.createElement('a');
            link.href = dosya;
            link.setAttribute('download', dosya);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            odemeKapat();
        }
    </script>
</body>
</html>
